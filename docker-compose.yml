services:
  db:
    image: postgres:16-alpine
    container_name: marksheet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: marksheet
      POSTGRES_PASSWORD: marksheet
      POSTGRES_DB: marksheet
    ports:
      - "5432:5432"
    volumes:
      - marksheet_pgdata:/var/lib/postgresql/data

volumes:
  marksheet_pgdata:
